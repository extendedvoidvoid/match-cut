name: QC Scheduled (Option B)

on:
  schedule:
    # Weekly — Monday 06:00 UTC
    - cron: "0 6 * * 1"
    # Monthly deep — 1st day 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      deep:
        description: "Run deep audit (tsc --noEmit)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  qc-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine audit mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deep }}" == "true" ]]; then
            echo "deep=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 6 1 * *" ]]; then
            echo "deep=true" >> "$GITHUB_OUTPUT"
          else
            echo "deep=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run QC audit
        env:
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          CTX7_TELEMETRY_DISABLED: 1
          MATCHCUT_HARDWARE_PROFILE: github-runner
          MATCHCUT_PARALLEL_JOBS: 4
        run: |
          if [[ "${{ steps.mode.outputs.deep }}" == "true" ]]; then
            bash scripts/qc-audit.sh --deep
          else
            bash scripts/qc-audit.sh
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qc-audit-${{ github.run_id }}
          path: docs/audits/
          retention-days: 90